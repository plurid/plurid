name: CI

# Enforces the three quality gates that pass as of 2026-06-20:
#   pnpm build · pnpm test · pnpm lint
# (The archival plurid-canvas / plurid-html packages are excluded at the source —
#  via the `!` globs in pnpm-workspace.yaml — so the recursive root scripts skip them.)

on:
  push:
    branches: [main, master, dev]
  pull_request:
  workflow_dispatch:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
