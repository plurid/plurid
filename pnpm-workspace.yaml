# Plurid engine monorepo workspace (added 2026-06-17 for the modernization).
# Links the engine packages locally so they build + resolve against each other,
# instead of each pulling published alpha versions from npm.
packages:
  - 'packages/plurid-web/plurid-core/*'
  - 'packages/plurid-web/plurid-works/*'
  - 'packages/plurid-utilities/*'
  - 'fixtures/render-test'
  # Archived (2026-06-20) — dropped from the build/test loop. Both are abandoned with zero
  # dependents/imports in the repo: plurid-canvas is an empty `0.0.0-0` with only a sanity
  # test; plurid-html is a stale-since-2021 Stencil duplicate of the engine (its
  # `stencil build --docs` no longer runs) with no @plurid deps. Source kept on disk.
  - '!packages/plurid-web/plurid-works/plurid-canvas'
  - '!packages/plurid-web/plurid-works/plurid-html'

# pnpm 11 blocks dependency postinstall scripts by default. esbuild needs its
# native binary; core-js (donation ad) and puppeteer (Chromium download, unused) do not.
allowBuilds:
  '@parcel/watcher': false
  core-js: false
  esbuild: true
  puppeteer: false

# Dedup to single versions. immer 11's new internal types leak through @reduxjs/toolkit
# 2.12's slice types (TS "WritableNonArrayDraft cannot be named") → RTK pairs with immer 10.
# react-redux + styled-components must be single instances or the React context breaks
# (a stray react-redux@8 / styled-components@5 from older @plurid pkgs → blank render).
overrides:
  immer: ^10
  react-redux: ^9
  styled-components: ^6
  # Single @types/react copy across the workspace. Two copies (18 from the libs, 19 from
  # the React-19 harness) leak into styled-components' shared type inference → TS2742
  # "inferred type cannot be named" in dts builds. The libs externalize react and build
  # their types against 18.3 (a subset of 19 at the type level); runtime React stays 19.
  '@types/react': ^18.3
  '@types/react-dom': ^18.3
